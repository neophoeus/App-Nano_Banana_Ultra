<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title>Editor Shared Context Fixture</title>
  <desc>Simple scenic fixture used by restore and editor shared-context tests.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="55%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)" />
  <circle cx="930" cy="180" r="88" fill="#fff7ed" opacity="0.75" />
  <path d="M0 560 C160 500 280 520 420 570 S720 650 1200 540 L1200 800 L0 800 Z" fill="url(#ground)" />
  <path d="M0 620 C180 570 310 600 470 650 S820 730 1200 630 L1200 800 L0 800 Z" fill="#064e3b" opacity="0.6" />
  <rect x="172" y="170" width="856" height="396" rx="28" fill="#ffffff" opacity="0.14" stroke="#ffffff" stroke-opacity="0.45" />
  <text x="220" y="270" fill="#fff7ed" font-family="Segoe UI, sans-serif" font-size="56" font-weight="700">Shared Context Fixture</text>
  <text x="220" y="334" fill="#fef3c7" font-family="Segoe UI, sans-serif" font-size="28">Used for editor and restore workflow regression coverage</text>
  <text x="220" y="402" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="24">Warm gradient sky, layered hills, and readable contrast for upload/editor tests.</text>
  <g transform="translate(220 455)">
    <rect width="232" height="58" rx="29" fill="#fff7ed" opacity="0.92" />
    <text x="28" y="38" fill="#9a3412" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">Editor input fixture</text>
  </g>
</svg>